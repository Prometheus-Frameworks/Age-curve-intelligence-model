<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Curve MVP</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Age Curve Research MVP</h1>

      <section>
        <h2>Run research</h2>
        <form id="run-form" class="row">
          <input id="input-file" type="file" accept=".csv,.json" required />
          <label><input id="run-validation" type="checkbox" /> Run validation after research</label>
          <button type="submit">Run pipeline</button>
        </form>
        <div id="run-status" class="status">No run yet.</div>
      </section>

      <section>
        <h2>Results overview</h2>
        <button id="refresh-summary">Refresh summary</button>
        <div id="summary" class="content-box">No summary loaded.</div>
      </section>

      <section>
        <h2>Position browser</h2>
        <div class="row">
          <select id="position-select">
            <option>QB</option>
            <option>RB</option>
            <option>WR</option>
            <option>TE</option>
          </select>
          <button id="load-position">Load position</button>
        </div>
        <div id="position-results" class="content-box">No position loaded.</div>
      </section>

      <section>
        <h2>Player search</h2>
        <form id="player-form" class="row">
          <input id="player-name" list="player-options" placeholder="Search player name" required />
          <datalist id="player-options"></datalist>
          <input id="player-id" placeholder="playerId" required readonly />
          <input id="player-season" placeholder="season (optional)" />
          <button type="submit">Lookup</button>
        </form>
        <div id="player-results" class="content-box">No player loaded.</div>
      </section>

      <section>
        <h2>Artifacts</h2>
        <button id="refresh-artifacts">Refresh artifacts</button>
        <ul id="artifact-list"></ul>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
